<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <title>Viento · Vigo</title>
  <style>
    :root {
      --bg:       #000000;
      --border:   #1e1e2a;
      --label-bg: #0d0d14;
      --font:     'SF Mono', 'Fira Code', 'Menlo', monospace;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: #ffffff;
      font-family: var(--font);
      font-size: 20px;
      min-height: 100dvh;
      overflow: hidden; /* outer body no scroll */
    }

    #estado {
      padding: 24px 14px;
      text-align: center;
      color: #555566;
      font-size: 14px;
      letter-spacing: 0.1em;
    }

    .spinner {
      display: inline-block;
      width: 16px; height: 16px;
      border: 2px solid #1e1e2a;
      border-top-color: #ffffff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-right: 8px;
      vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .error-box {
      margin: 16px 14px;
      padding: 14px;
      background: #2a0a0a;
      border: 1px solid #5a1a1a;
      border-radius: 6px;
      color: #ff6b6b;
      font-size: 14px;
      line-height: 1.5;
    }

    .retry-btn {
      margin-top: 10px;
      display: inline-block;
      padding: 8px 16px;
      background: #3a1010;
      border: 1px solid #7a2020;
      border-radius: 4px;
      color: #ff9999;
      cursor: pointer;
      font-family: var(--font);
      font-size: 14px;
    }

    /*
      Layout:
      - #wrapper: full viewport, overflow hidden
      - #top-rows: sticky top section (fecha + hora rows), overflow-x hidden (scrolled by JS)
      - #body-scroll: vertically scrollable, horizontally scrollable
    */

    #wrapper {
      display: flex;
      flex-direction: column;
      height: 100dvh;
      overflow: hidden;
    }

    /* Top sticky area: contains the two fixed rows */
    #top-rows {
      flex-shrink: 0;
      overflow: hidden; /* JS will sync scrollLeft */
      border-bottom: 2px solid #333344;
    }

    #top-table {
      border-collapse: collapse;
      white-space: nowrap;
    }

    /* Body scroll area */
    #body-scroll {
      flex: 1;
      overflow: auto;
      -webkit-overflow-scrolling: touch;
    }

    #body-scroll::-webkit-scrollbar { width: 4px; height: 4px; }
    #body-scroll::-webkit-scrollbar-track { background: var(--bg); }
    #body-scroll::-webkit-scrollbar-thumb { background: #1e1e2a; border-radius: 2px; }

    #body-table {
      border-collapse: collapse;
      white-space: nowrap;
    }

    /* Shared cell styles */
    .top-table td,
    #body-table td {
      padding: 8px 14px;
      text-align: center;
      border-bottom: 1px solid var(--border);
      vertical-align: middle;
      font-size: 20px;
    }

    /* Sticky label column */
    .label {
      position: sticky;
      left: 0;
      z-index: 10;
      background: var(--label-bg);
      font-weight: 600;
      color: #ffffff;
      font-size: 20px;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      padding: 8px 12px 8px 14px;
      border-right: 1px solid var(--border);
      min-width: 100px;
    }

    /* Day row */
    .r-date { background: #111118; color: #ffffff; font-weight: 700; font-size: 18px; }

    /* Hora: three variants set inline */

    /* Clima row */
    .r-clima { background: #000000; font-size: 18px; }

    /* Day separator */
    .day-sep { border-left: 3px solid #4a70a0 !important; }

    /* Now highlight */
    .now-col {
      background: #2a2a00 !important;
      color: #ffee44 !important;
      font-weight: 900 !important;
    }
  </style>
</head>
<body>

<div id="estado"><span class="spinner"></span> Cargando datos…</div>

<div id="wrapper" style="display:none">
  <!-- Fixed top rows: fecha + hora -->
  <div id="top-rows">
    <table id="top-table"></table>
  </div>
  <!-- Scrollable body rows -->
  <div id="body-scroll">
    <table id="body-table"></table>
  </div>
</div>

<script>
  /* ── Day abbreviations ── */
  const DIA_ABR = ['DO','LU','MA','MI','JU','VI','SA'];

  /* ── Color functions ── */
  function windBg(v) {
    if (v === 0)  return ['#ffffff', '#000000'];
    if (v < 10)   return ['#ccffff', '#000000'];
    if (v < 20)   return ['#aaddaa', '#000000'];
    if (v < 30)   return ['#88cc44', '#000000'];
    if (v < 40)   return ['#ffee44', '#000000'];
    if (v < 50)   return ['#ffaa00', '#000000'];
    if (v < 60)   return ['#ff5500', '#ffffff'];
    if (v < 70)   return ['#cc0000', '#ffffff'];
    return              ['#880088', '#ffffff'];
  }

  function nubeBg(v) {
    if (v === 0)  return ['#ffffff', '#000000'];
    if (v <= 30)  return ['#cccccc', '#000000'];
    if (v <= 60)  return ['#888888', '#ffffff'];
    return              ['#444444', '#ffffff'];
  }

  function lluviaBg(v) {
    if (v === 0)   return ['#ffffff', '#000000'];
    if (v <= 0.5)  return ['#aaddff', '#000000'];
    if (v <= 2)    return ['#4488cc', '#ffffff'];
    if (v <= 5)    return ['#1155aa', '#ffffff'];
    return               ['#002266', '#ffffff'];
  }

  function tempBg(v) {
    if (v <= 0)   return ['#003399', '#ffffff'];
    if (v <= 8)   return ['#3366cc', '#ffffff'];
    if (v <= 12)  return ['#66aaff', '#ffffff'];
    if (v <= 17)  return ['#ffee44', '#000000'];
    if (v <= 25)  return ['#ff8800', '#000000'];
    return              ['#cc2200', '#ffffff'];
  }

  /* ── Sunrise/sunset helpers ── */
  // Parse "YYYY-MM-DDTHH:MM" → { h, m, label "HH:MM" }
  function parseSun(str) {
    if (!str) return null;
    const parts = str.split('T');
    if (parts.length < 2) return null;
    const [hh, mm] = parts[1].split(':');
    return { h: parseInt(hh), m: parseInt(mm), label: `${hh}:${mm}` };
  }

  function horaStyle(hora, sunrise, sunset, isNow) {
    if (isNow) return { bg: '#2a2a00', fg: '#ffee44', fw: '900', text: `${String(hora).padStart(2,'0')}` };

    const sr = parseSun(sunrise);
    const ss = parseSun(sunset);

    // Is this the sunrise hour?
    if (sr && hora === sr.h) {
      return { bg: '#ff8800', fg: '#000000', fw: '700', text: sr.label };
    }
    // Is this the sunset hour?
    if (ss && hora === ss.h) {
      return { bg: '#ff8800', fg: '#000000', fw: '700', text: ss.label };
    }

    // Day or night?
    const isDay = sr && ss && hora > sr.h && hora < ss.h;
    if (isDay) {
      return { bg: '#ffffff', fg: '#000000', fw: '600', text: `${String(hora).padStart(2,'0')}` };
    }
    // Night
    return { bg: '#000000', fg: '#ffffff', fw: '400', text: `${String(hora).padStart(2,'0')}` };
  }

  function climaEmoji(d, sunrise, sunset) {
    if (d.lluvia > 0) return '🌧️';
    if (d.nub_alta > 0 || d.nub_media > 0 || d.nub_baja > 0) return '☁️';
    // clear — day or night?
    const sr = parseSun(sunrise);
    const ss = parseSun(sunset);
    const isDay = sr && ss && d.hora > sr.h && d.hora < ss.h;
    return isDay ? '☀️' : '🌙';
  }

  /* ── Build tables ── */
  function buildTables(data) {
    if (!data || data.length === 0) return;

    const nowMadrid = new Date().toLocaleString('en-US', { timeZone: 'Europe/Madrid' });
    const nowHour   = new Date(nowMadrid).getHours();

    let nowIdx = 0;
    for (let i = 0; i < data.length; i++) {
      if (data[i].hora === nowHour) { nowIdx = i; break; }
    }

    // Pre-compute per-column data
    const cols = data.map((d, i) => {
      const isNow  = i === nowIdx;
      const sep    = (i > 0 && d.diaSemana !== data[i-1].diaSemana) ? ' day-sep' : '';
      const abr    = DIA_ABR[d.diaSemana];
      const hs     = horaStyle(d.hora, d.sunrise, d.sunset, isNow);
      const emoji  = climaEmoji(d, d.sunrise, d.sunset);

      const [wBg,  wFg]  = windBg(d.viento);
      const [gBg,  gFg]  = windBg(d.rafagas);
      const [tBg,  tFg]  = tempBg(d.temp);
      const [lBg,  lFg]  = lluviaBg(d.lluvia);
      const [naBg, naFg] = nubeBg(d.nub_alta);
      const [nmBg, nmFg] = nubeBg(d.nub_media);
      const [nbBg, nbFg] = nubeBg(d.nub_baja);

      return {
        sep,
        fecha:  `<td class="r-date${sep}">${abr}</td>`,
        hora:   `<td style="background:${hs.bg};color:${hs.fg};font-weight:${hs.fw};${sep?'border-left:3px solid #4a70a0;':''}">${hs.text}</td>`,
        clima:  `<td class="r-clima${sep}">${emoji}</td>`,
        lluvia: `<td style="background:${lBg};color:${lFg};${sep?'border-left:3px solid #4a70a0;':''}">${d.lluvia}</td>`,
        temp:   `<td style="background:${tBg};color:${tFg};${sep?'border-left:3px solid #4a70a0;':''}">${d.temp}°</td>`,
        viento: `<td style="background:${wBg};color:${wFg};${sep?'border-left:3px solid #4a70a0;':''}">${d.viento}</td>`,
        rachas: `<td style="background:${gBg};color:${gFg};${sep?'border-left:3px solid #4a70a0;':''}">${d.rafagas}</td>`,
        na:     `<td style="background:${naBg};color:${naFg};${sep?'border-left:3px solid #4a70a0;':''}">${d.nub_alta}</td>`,
        nm:     `<td style="background:${nmBg};color:${nmFg};${sep?'border-left:3px solid #4a70a0;':''}">${d.nub_media}</td>`,
        nb:     `<td style="background:${nbBg};color:${nbFg};${sep?'border-left:3px solid #4a70a0;':''}">${d.nub_baja}</td>`,
      };
    });

    const labelTd = (txt) => `<td class="label">${txt}</td>`;

    // TOP table: fecha + hora
    document.getElementById('top-table').innerHTML =
      `<tr>${labelTd('Fecha')}${cols.map(c => c.fecha).join('')}</tr>` +
      `<tr>${labelTd('Hora')}${cols.map(c => c.hora).join('')}</tr>`;

    // BODY table: clima + rest
    const bodyFilas = [
      { label: 'Clima',  key: 'clima'  },
      { label: 'Lluvia', key: 'lluvia' },
      { label: 'Temp',   key: 'temp'   },
      { label: 'Viento', key: 'viento' },
      { label: 'Rachas', key: 'rachas' },
      { label: 'Na %',   key: 'na'     },
      { label: 'Nm %',   key: 'nm'     },
      { label: 'Nb %',   key: 'nb'     },
    ];

    document.getElementById('body-table').innerHTML = bodyFilas.map(f =>
      `<tr>${labelTd(f.label)}${cols.map(c => c[f.key]).join('')}</tr>`
    ).join('');

    // Sync horizontal scroll between top-rows and body-scroll
    const bodyScroll = document.getElementById('body-scroll');
    const topRows    = document.getElementById('top-rows');
    const topTable   = document.getElementById('top-table');

    bodyScroll.addEventListener('scroll', () => {
      topTable.style.transform = `translateX(-${bodyScroll.scrollLeft}px)`;
    }, { passive: true });

    // Scroll to now column
    setTimeout(() => {
      // Find nowIdx cell in body table — first data cell of first body row
      const firstBodyRow = document.querySelector('#body-table tr');
      if (firstBodyRow) {
        const cells = firstBodyRow.querySelectorAll('td');
        // cells[0] is label, cells[nowIdx+1] is the now column
        const nowCell = cells[nowIdx + 1];
        if (nowCell) {
          const cellLeft   = nowCell.offsetLeft;
          const cellWidth  = nowCell.offsetWidth;
          const scrollW    = bodyScroll.clientWidth;
          bodyScroll.scrollLeft = cellLeft - scrollW / 2 + cellWidth / 2;
        }
      }
    }, 300);
  }

  function mostrarError(msg) {
    document.getElementById('estado').innerHTML = `
      <div class="error-box">⚠️ ${msg}<br>
        <span class="retry-btn" onclick="cargar()">↻ Reintentar</span>
      </div>`;
  }

  async function cargar() {
    document.getElementById('wrapper').style.display = 'none';
    document.getElementById('estado').style.display  = 'block';
    document.getElementById('estado').innerHTML = '<span class="spinner"></span> Cargando datos…';

    try {
      const res  = await fetch('/api/wind');
      const data = await res.json();

      if (!res.ok || data.error) { mostrarError(data.error || `Error ${res.status}`); return; }
      if (!Array.isArray(data) || data.length === 0) { mostrarError('Sin datos disponibles.'); return; }

      buildTables(data);
      document.getElementById('estado').style.display  = 'none';
      document.getElementById('wrapper').style.display = 'flex';

    } catch (e) {
      mostrarError('Sin conexión o error de servidor.');
      console.error(e);
    }
  }

  cargar();
  setInterval(cargar, 10 * 60 * 1000);
</script>
</body>
</html>
