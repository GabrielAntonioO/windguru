<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <title>Viento · Vigo</title>
  <style>
    :root {
      --bg:       #000000;
      --border:   #1e1e2a;
      --text:     #e8e8f0;
      --muted:    #555566;
      --label-bg: #0d0d14;
      --font:     'SF Mono', 'Fira Code', 'Menlo', monospace;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      font-size: 20px;
      min-height: 100dvh;
      overflow-x: hidden;
    }

    #estado {
      padding: 24px 14px;
      text-align: center;
      color: var(--muted);
      font-size: 14px;
      letter-spacing: 0.1em;
    }

    .spinner {
      display: inline-block;
      width: 16px; height: 16px;
      border: 2px solid var(--border);
      border-top-color: var(--text);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-right: 8px;
      vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .error-box {
      margin: 16px 14px;
      padding: 14px;
      background: #2a0a0a;
      border: 1px solid #5a1a1a;
      border-radius: 6px;
      color: #ff6b6b;
      font-size: 14px;
      line-height: 1.5;
    }

    .retry-btn {
      margin-top: 10px;
      display: inline-block;
      padding: 8px 16px;
      background: #3a1010;
      border: 1px solid #7a2020;
      border-radius: 4px;
      color: #ff9999;
      cursor: pointer;
      font-family: var(--font);
      font-size: 14px;
    }

    .scroll {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }
    .scroll::-webkit-scrollbar { height: 4px; }
    .scroll::-webkit-scrollbar-track { background: var(--bg); }
    .scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    table { border-collapse: collapse; white-space: nowrap; }

    td {
      padding: 8px 14px;
      text-align: center;
      border-bottom: 1px solid var(--border);
      vertical-align: middle;
      font-size: 20px;
      color: #ffffff;
    }

    .label {
      position: sticky;
      left: 0;
      background: var(--label-bg);
      font-weight: 600;
      color: #ffffff;
      font-size: 20px;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      padding: 8px 12px 8px 14px;
      border-right: 1px solid var(--border);
      z-index: 2;
      min-width: 100px;
    }

    .r-date { background: #111118; color: #ffffff; font-weight: 700; }
    .r-hora { background: #1a1a26; font-weight: 700; color: #ffffff; }

    .now-col {
      background: #2a2a00 !important;
      color: #ffee44 !important;
      font-weight: 900 !important;
    }
  </style>
</head>
<body>

<div id="estado"><span class="spinner"></span> Cargando datos…</div>

<div class="scroll" id="contenedor" style="display:none">
  <table id="tabla"></table>
</div>

<script>
  /* VIENTO: blanco(0) → celeste → verde claro → verde → amarillo → naranja → rojo → violeta */
  function windBg(v) {
    if (v === 0)  return ['#ffffff', '#000000']; // blanco, letras negras
    if (v < 10)   return ['#ccffff', '#000000']; // celeste muy claro
    if (v < 20)   return ['#aaddaa', '#000000']; // verde claro
    if (v < 30)   return ['#88cc44', '#000000']; // verde medio
    if (v < 40)   return ['#ffee44', '#000000']; // amarillo — letras negras
    if (v < 50)   return ['#ffaa00', '#000000']; // naranja — letras negras
    if (v < 60)   return ['#ff5500', '#ffffff']; // naranja rojo
    if (v < 70)   return ['#cc0000', '#ffffff']; // rojo
    return              ['#880088', '#ffffff']; // violeta
  }

  /* NUBES: blanco(0%) → gris claro(1-30%) → gris medio(31-60%) → gris oscuro(61-100%) */
  function nubeBg(v) {
    if (v === 0)  return ['#ffffff', '#000000']; // blanco, letras negras
    if (v <= 30)  return ['#cccccc', '#000000']; // gris claro, letras negras
    if (v <= 60)  return ['#888888', '#ffffff']; // gris medio, letras blancas
    return              ['#444444', '#ffffff']; // gris oscuro, letras blancas
  }

  /* LLUVIA: blanco(0) → celeste claro → azul medio → azul vivo → azul muy oscuro */
  function lluviaBg(v) {
    if (v === 0)   return ['#ffffff', '#000000']; // blanco, letras negras
    if (v <= 0.5)  return ['#aaddff', '#000000']; // celeste claro, letras negras
    if (v <= 2)    return ['#4488cc', '#ffffff']; // azul medio
    if (v <= 5)    return ['#1155aa', '#ffffff']; // azul vivo
    return               ['#002266', '#ffffff']; // azul muy oscuro
  }

  /* TEMPERATURA: azul oscuro → azul → celeste → amarillo → naranja → rojo */
  function tempBg(v) {
    if (v <= 0)   return ['#003399', '#ffffff'];
    if (v <= 8)   return ['#3366cc', '#ffffff'];
    if (v <= 12)  return ['#66aaff', '#ffffff'];
    if (v <= 17)  return ['#ffee44', '#000000']; // amarillo — letras negras
    if (v <= 25)  return ['#ff8800', '#000000']; // naranja — letras negras
    return              ['#cc2200', '#ffffff']; // rojo
  }

  function buildTable(data) {
    if (!data || data.length === 0) return '';

    const nowMadrid = new Date().toLocaleString('en-US', { timeZone: 'Europe/Madrid' });
    const nowHour = new Date(nowMadrid).getHours();

    let nowIdx = 0;
    for (let i = 0; i < data.length; i++) {
      if (data[i].hora === nowHour) { nowIdx = i; break; }
    }

    let dayChangeIdx = -1;
    for (let i = 1; i < data.length; i++) {
      if (data[i].dia !== data[i-1].dia) { dayChangeIdx = i; break; }
    }

    const cols = data.map((d, i) => {
      const isNow = i === nowIdx;
      const sep = (dayChangeIdx > 0 && i === dayChangeIdx) ? 'border-left:3px solid #4a70a0;' : '';

      const [wBg,  wFg]  = windBg(d.viento);
      const [gBg,  gFg]  = windBg(d.rafagas);
      const [tBg,  tFg]  = tempBg(d.temp);
      const [lBg,  lFg]  = lluviaBg(d.lluvia);
      const [naBg, naFg] = nubeBg(d.nub_alta);
      const [nmBg, nmFg] = nubeBg(d.nub_media);
      const [nbBg, nbFg] = nubeBg(d.nub_baja);

      const showFecha = (i === 0 || d.dia !== data[i-1].dia) ? d.dia : '';

      return {
        fecha:  `<td class="r-date" style="${sep}">${showFecha}</td>`,
        hora:   `<td class="r-hora${isNow ? ' now-col' : ''}" style="${sep}">${d.hora}h</td>`,
        lluvia: `<td style="background:${lBg};color:${lFg};${sep}">${d.lluvia}</td>`,
        temp:   `<td style="background:${tBg};color:${tFg};${sep}">${d.temp}°</td>`,
        viento: `<td style="background:${wBg};color:${wFg};${sep}">${d.viento}</td>`,
        rachas: `<td style="background:${gBg};color:${gFg};${sep}">${d.rafagas}</td>`,
        na:     `<td style="background:${naBg};color:${naFg};${sep}">${d.nub_alta}</td>`,
        nm:     `<td style="background:${nmBg};color:${nmFg};${sep}">${d.nub_media}</td>`,
        nb:     `<td style="background:${nbBg};color:${nbFg};${sep}">${d.nub_baja}</td>`,
      };
    });

    const filas = [
      { label: 'Fecha',  key: 'fecha'  },
      { label: 'Hora',   key: 'hora'   },
      { label: 'Lluvia', key: 'lluvia' },
      { label: 'Temp',   key: 'temp'   },
      { label: 'Viento', key: 'viento' },
      { label: 'Rachas', key: 'rachas' },
      { label: 'Na %',   key: 'na'     },
      { label: 'Nm %',   key: 'nm'     },
      { label: 'Nb %',   key: 'nb'     },
    ];

    return filas.map(f =>
      `<tr><td class="label">${f.label}</td>${cols.map(c => c[f.key]).join('')}</tr>`
    ).join('');
  }

  function mostrarError(msg) {
    document.getElementById('estado').innerHTML = `
      <div class="error-box">⚠️ ${msg}<br>
        <span class="retry-btn" onclick="cargar()">↻ Reintentar</span>
      </div>`;
  }

  async function cargar() {
    document.getElementById('contenedor').style.display = 'none';
    document.getElementById('estado').style.display = 'block';
    document.getElementById('estado').innerHTML = '<span class="spinner"></span> Cargando datos…';

    try {
      const res = await fetch('/api/wind');
      const data = await res.json();

      if (!res.ok || data.error) { mostrarError(data.error || `Error ${res.status}`); return; }
      if (!Array.isArray(data) || data.length === 0) { mostrarError('Sin datos disponibles.'); return; }

      document.getElementById('tabla').innerHTML = buildTable(data);
      document.getElementById('estado').style.display = 'none';
      document.getElementById('contenedor').style.display = 'block';

      setTimeout(() => {
        const nowCol = document.querySelector('.now-col');
        if (nowCol) nowCol.scrollIntoView({ inline: 'center', behavior: 'smooth' });
      }, 300);

    } catch (e) {
      mostrarError('Sin conexión o error de servidor.');
      console.error(e);
    }
  }

  cargar();
  setInterval(cargar, 10 * 60 * 1000);
</script>
</body>
</html>
