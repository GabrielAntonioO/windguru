<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <title>Viento · Vigo</title>
  <style>
    :root {
      --bg:       #000000;
      --border:   #1e1e2a;
      --label-bg: #0d0d14;
      --font:     'SF Mono', 'Fira Code', 'Menlo', monospace;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: #ffffff;
      font-family: var(--font);
      font-size: 20px;
    }

    #estado {
      padding: 24px 14px;
      text-align: center;
      color: #555566;
      font-size: 14px;
      letter-spacing: 0.1em;
    }

    .spinner {
      display: inline-block;
      width: 16px; height: 16px;
      border: 2px solid #1e1e2a;
      border-top-color: #ffffff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-right: 8px;
      vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .error-box {
      margin: 16px 14px;
      padding: 14px;
      background: #2a0a0a;
      border: 1px solid #5a1a1a;
      border-radius: 6px;
      color: #ff6b6b;
      font-size: 14px;
      line-height: 1.5;
    }

    .retry-btn {
      margin-top: 10px;
      display: inline-block;
      padding: 8px 16px;
      background: #3a1010;
      border: 1px solid #7a2020;
      border-radius: 4px;
      color: #ff9999;
      cursor: pointer;
      font-family: var(--font);
      font-size: 14px;
    }

    /*
      Single scrollable container.
      Horizontal scroll on the whole page.
      Vertical scroll on the whole page.
      Sticky rows use position:sticky + top.
      Sticky label column uses position:sticky + left.
    */
    #contenedor {
      overflow: auto;
      -webkit-overflow-scrolling: touch;
      width: 100vw;
      height: 100dvh;
    }

    #contenedor::-webkit-scrollbar { width: 0; height: 0; }

    table {
      border-collapse: collapse;
      white-space: nowrap;
    }

    td {
      padding: 8px 14px;
      text-align: center;
      border-bottom: 1px solid var(--border);
      vertical-align: middle;
      font-size: 20px;
      color: #ffffff;
    }

    /* Sticky label column — always visible on left */
    .label {
      position: sticky;
      left: 0;
      z-index: 20;
      background: var(--label-bg);
      font-weight: 600;
      color: #ffffff;
      font-size: 20px;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      padding: 8px 12px 8px 14px;
      border-right: 1px solid var(--border);
      min-width: 100px;
    }

    /* Sticky top rows */
    .sticky-row td {
      position: sticky;
      top: 0;
      z-index: 15;
    }

    /* The label cell in a sticky row needs higher z-index (overlap corner) */
    .sticky-row .label {
      z-index: 25;
    }

    /* Offset second sticky row below first */
    .sticky-row-2 td {
      position: sticky;
      top: 37px; /* height of first row approx */
      z-index: 14;
    }

    .sticky-row-2 .label {
      z-index: 24;
    }

    /* Date row */
    .r-date {
      background: #111118;
      color: #ffffff;
      font-weight: 700;
      font-size: 18px;
    }

    /* Clima row */
    .r-clima { background: #000000; font-size: 18px; }

    /* Day separator */
    .day-sep { border-left: 3px solid #4a70a0; }
  </style>
</head>
<body>

<div id="estado"><span class="spinner"></span> Cargando datos…</div>

<div id="contenedor" style="display:none">
  <table id="tabla"></table>
</div>

<script>
  const DIA_ABR = ['DO','LU','MA','MI','JU','VI','SA'];

  /* ── Color helpers ── */
  function windBg(v) {
    if (v === 0)  return ['#ffffff','#000000'];
    if (v < 10)   return ['#ccffff','#000000'];
    if (v < 20)   return ['#aaddaa','#000000'];
    if (v < 30)   return ['#88cc44','#000000'];
    if (v < 40)   return ['#ffee44','#000000'];
    if (v < 50)   return ['#ffaa00','#000000'];
    if (v < 60)   return ['#ff5500','#ffffff'];
    if (v < 70)   return ['#cc0000','#ffffff'];
    return              ['#880088','#ffffff'];
  }

  function nubeBg(v) {
    if (v === 0)  return ['#ffffff','#000000'];
    if (v <= 30)  return ['#cccccc','#000000'];
    if (v <= 60)  return ['#888888','#ffffff'];
    return              ['#444444','#ffffff'];
  }

  function lluviaBg(v) {
    if (v === 0)   return ['#ffffff','#000000'];
    if (v <= 0.5)  return ['#aaddff','#000000'];
    if (v <= 2)    return ['#4488cc','#ffffff'];
    if (v <= 5)    return ['#1155aa','#ffffff'];
    return               ['#002266','#ffffff'];
  }

  function tempBg(v) {
    if (v <= 0)   return ['#003399','#ffffff'];
    if (v <= 8)   return ['#3366cc','#ffffff'];
    if (v <= 12)  return ['#66aaff','#ffffff'];
    if (v <= 17)  return ['#ffee44','#000000'];
    if (v <= 25)  return ['#ff8800','#000000'];
    return              ['#cc2200','#ffffff'];
  }

  /* ── Sun helpers ── */
  // "YYYY-MM-DDTHH:MM" → { h: int, label: "HH:MM" }
  function parseSun(str) {
    if (!str) return null;
    const t = str.slice(11, 16); // "HH:MM"
    const h = parseInt(str.slice(11, 13));
    return { h, label: t };
  }

  function horaCell(d, sep) {
    const sepStyle = sep ? 'border-left:3px solid #4a70a0;' : '';

    const sr = parseSun(d.sunrise);
    const ss = parseSun(d.sunset);

    if (sr && d.hora === sr.h) {
      return `<td style="background:#ff8800;color:#000000;font-weight:700;${sepStyle}">${sr.label}</td>`;
    }
    if (ss && d.hora === ss.h) {
      return `<td style="background:#ff8800;color:#000000;font-weight:700;${sepStyle}">${ss.label}</td>`;
    }

    const isDay = sr && ss && d.hora > sr.h && d.hora < ss.h;
    const txt   = String(d.hora).padStart(2,'0');

    if (isDay) {
      return `<td style="background:#ffffff;color:#000000;font-weight:600;${sepStyle}">${txt}</td>`;
    }
    return `<td style="background:#000000;color:#ffffff;font-weight:400;border:1px solid #222;${sepStyle}">${txt}</td>`;
  }

  function climaEmoji(d) {
    if (d.lluvia > 0) return '🌧️';
    if (d.nub_alta > 0 || d.nub_media > 0 || d.nub_baja > 0) return '☁️';
    const sr = parseSun(d.sunrise);
    const ss = parseSun(d.sunset);
    const isDay = sr && ss && d.hora > sr.h && d.hora < ss.h;
    return isDay ? '☀️' : '🌙';
  }

  function buildTable(data) {
    const nowMadrid = new Date().toLocaleString('en-US', { timeZone: 'Europe/Madrid' });
    const nowHour   = new Date(nowMadrid).getHours();

    let nowIdx = 0;
    for (let i = 0; i < data.length; i++) {
      if (data[i].hora === nowHour) { nowIdx = i; break; }
    }

    // Compute day-of-week from dateKey "YYYY-MM-DD"
    function dowFromKey(key) {
      // new Date("YYYY-MM-DD") is UTC midnight — use split to avoid TZ offset
      const [y, m, d] = key.split('-').map(Number);
      return new Date(y, m - 1, d).getDay(); // 0=Sun
    }

    // Detect day changes
    const isDayStart = data.map((d, i) => {
      if (i === 0) return false;
      return d.dateKey !== data[i-1].dateKey;
    });

    const label = txt => `<td class="label">${txt}</td>`;

    // Build each row
    const rows = {
      fecha:  `<tr class="sticky-row">${label('Fecha')}`,
      hora:   `<tr class="sticky-row-2">${label('Hora')}`,
      clima:  `<tr>${label('Clima')}`,
      lluvia: `<tr>${label('Lluvia')}`,
      temp:   `<tr>${label('Temp')}`,
      viento: `<tr>${label('Viento')}`,
      rachas: `<tr>${label('Rachas')}`,
      na:     `<tr>${label('Na %')}`,
      nm:     `<tr>${label('Nm %')}`,
      nb:     `<tr>${label('Nb %')}`,
    };

    data.forEach((d, i) => {
      
      const sep   = isDayStart[i];
      const sepStyle = sep ? 'border-left:3px solid #4a70a0;' : '';
      const dow   = dowFromKey(d.dateKey);
      const abr   = DIA_ABR[dow];

      const [wBg,  wFg]  = windBg(d.viento);
      const [gBg,  gFg]  = windBg(d.rafagas);
      const [tBg,  tFg]  = tempBg(d.temp);
      const [lBg,  lFg]  = lluviaBg(d.lluvia);
      const [naBg, naFg] = nubeBg(d.nub_alta);
      const [nmBg, nmFg] = nubeBg(d.nub_media);
      const [nbBg, nbFg] = nubeBg(d.nub_baja);

      rows.fecha  += `<td class="r-date" style="${sepStyle}">${abr}</td>`;
      rows.hora   += horaCell(d, sep);
      rows.clima  += `<td class="r-clima" style="${sepStyle}">${climaEmoji(d)}</td>`;
      rows.lluvia += `<td style="background:${lBg};color:${lFg};${sepStyle}">${d.lluvia}</td>`;
      rows.temp   += `<td style="background:${tBg};color:${tFg};${sepStyle}">${d.temp}°</td>`;
      rows.viento += `<td style="background:${wBg};color:${wFg};${sepStyle}">${d.viento}</td>`;
      rows.rachas += `<td style="background:${gBg};color:${gFg};${sepStyle}">${d.rafagas}</td>`;
      rows.na     += `<td style="background:${naBg};color:${naFg};${sepStyle}">${d.nub_alta}</td>`;
      rows.nm     += `<td style="background:${nmBg};color:${nmFg};${sepStyle}">${d.nub_media}</td>`;
      rows.nb     += `<td style="background:${nbBg};color:${nbFg};${sepStyle}">${d.nub_baja}</td>`;
    });

    Object.keys(rows).forEach(k => rows[k] += '</tr>');

    document.getElementById('tabla').innerHTML =
      rows.fecha + rows.hora + rows.clima + rows.lluvia +
      rows.temp + rows.viento + rows.rachas + rows.na + rows.nm + rows.nb;

    // Scroll to now column
    setTimeout(() => {
      const cont = document.getElementById('contenedor');
      const tbl  = document.getElementById('tabla');
      const firstRow = tbl.querySelector('tr.sticky-row-2');
      if (firstRow) {
        const cells = firstRow.querySelectorAll('td');
        const nowCell = cells[nowIdx + 1]; // +1 for label
        if (nowCell) {
          const cellLeft  = nowCell.offsetLeft;
          const cellWidth = nowCell.offsetWidth;
          cont.scrollLeft = cellLeft - cont.clientWidth / 2 + cellWidth / 2;
        }
      }
    }, 200);
  }

  function mostrarError(msg) {
    document.getElementById('estado').innerHTML = `
      <div class="error-box">⚠️ ${msg}<br>
        <span class="retry-btn" onclick="cargar()">↻ Reintentar</span>
      </div>`;
  }

  async function cargar() {
    document.getElementById('contenedor').style.display = 'none';
    document.getElementById('estado').style.display = 'block';
    document.getElementById('estado').innerHTML = '<span class="spinner"></span> Cargando datos…';

    try {
      const res  = await fetch('/api/wind');
      const data = await res.json();

      if (!res.ok || data.error) { mostrarError(data.error || `Error ${res.status}`); return; }
      if (!Array.isArray(data) || data.length === 0) { mostrarError('Sin datos disponibles.'); return; }

      buildTable(data);
      document.getElementById('estado').style.display  = 'none';
      document.getElementById('contenedor').style.display = 'block';

    } catch (e) {
      mostrarError('Sin conexión o error de servidor.');
      console.error(e);
    }
  }

  cargar();
  setInterval(cargar, 10 * 60 * 1000);
</script>
</body>
</html>
