<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <title>Viento · Vigo</title>
  <style>
    :root {
      --bg:       #0a0a0f;
      --border:   #1e1e2a;
      --text:     #e8e8f0;
      --muted:    #555566;
      --label-bg: #0d0d14;
      --font:     'SF Mono', 'Fira Code', 'Menlo', monospace;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      font-size: 20px;
      min-height: 100dvh;
      overflow-x: hidden;
    }

    header {
      padding: 12px 14px 10px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      background: var(--bg);
      z-index: 10;
    }

    .spot-name { font-size: 18px; font-weight: 700; letter-spacing: 0.08em; }
    .spot-sub  { font-size: 12px; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; margin-top: 2px; }
    .update-time { font-size: 12px; color: var(--muted); text-align: right; }

    #estado {
      padding: 24px 14px; text-align: center;
      color: var(--muted); font-size: 14px; letter-spacing: 0.1em;
    }

    .spinner {
      display: inline-block; width: 16px; height: 16px;
      border: 2px solid var(--border); border-top-color: var(--text);
      border-radius: 50%; animation: spin 0.8s linear infinite;
      margin-right: 8px; vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .error-box {
      margin: 16px 14px; padding: 14px;
      background: #2a0a0a; border: 1px solid #5a1a1a;
      border-radius: 6px; color: #ff6b6b; font-size: 14px; line-height: 1.5;
    }
    .retry-btn {
      margin-top: 10px; display: inline-block; padding: 8px 16px;
      background: #3a1010; border: 1px solid #7a2020;
      border-radius: 4px; color: #ff9999; cursor: pointer;
      font-family: var(--font); font-size: 14px;
    }

    .scroll { overflow-x: auto; -webkit-overflow-scrolling: touch; }
    .scroll::-webkit-scrollbar { height: 4px; }
    .scroll::-webkit-scrollbar-track { background: var(--bg); }
    .scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    table { border-collapse: collapse; white-space: nowrap; }

    td {
      padding: 8px 14px; text-align: center;
      border-bottom: 1px solid var(--border);
      vertical-align: middle; font-size: 20px;
    }

    .label {
      position: sticky; left: 0;
      background: var(--label-bg); font-weight: 600;
      color: #ffffff; font-size: 20px;
      letter-spacing: 0.1em; text-transform: uppercase;
      padding: 8px 12px 8px 14px;
      border-right: 1px solid var(--border);
      z-index: 2; min-width: 100px;
    }

    .r-date  { background: #111118; font-size: 20px; color: #ffffff; font-weight: 700; }
    .r-hora  { background: #1a1a26; font-weight: 700; font-size: 20px; }
    .r-wind  { background: #1a7a3a; }
.wind-suave { background: #1a6a2a; }
    .wind-medio { background: #6a5a0a; }
    .wind-fuerte { background: #8a4a0a; }
    .wind-muy_fuerte { background: #8a1a1a; }
    .r-gust  { background: #7a5a00; }
    .r-temp  { background: #5a2a8a; }
    .r-low   { background: #1a3f7a; }
    .r-mid   { background: #2a5090; }
    .r-high  { background: #4a70a0; }
    .r-rain  { background: #1a3ab0; }

    .r-hora td.now-col { background: #2a2a00; color: #ffee44; font-weight: 900; }

    .wind-calm   { color: #aaffbb; }
    .wind-light  { color: #88ffaa; }
    .wind-mod    { color: #ffee44; }
    .wind-fresh  { color: #ffbb22; }
    .wind-strong { color: #ff6622; }
    .wind-storm  { color: #ff2222; font-weight: 900; }
  </style>
</head>
<body>



<div id="estado"><span class="spinner"></span> Cargando datos…</div>

<div class="scroll" id="contenedor" style="display:none">
  <table id="tabla"></table>
</div>

<script>
  function windClass(v) {
    if (v < 10) return 'wind-calm';
    if (v < 20) return 'wind-light';
    if (v < 30) return 'wind-mod';
    if (v < 40) return 'wind-fresh';
    if (v < 55) return 'wind-strong';
    return 'wind-storm';
  }

  function buildTable(data) {
    const nowStr = new Date().toISOString().slice(0, 13);
    let nowIdx = 0;
    data.forEach((d, i) => {
      if (d.timestamp && d.timestamp.slice(0, 13) === nowStr) nowIdx = i;
    });

    let lastDia = '';
    const fechaCells = data.map(d => {
      const show = d.dia !== lastDia ? d.dia : '';
      lastDia = d.dia;
      return `<td class="r-date">${show}</td>`;
    }).join('');

    const filas = [
      { label: 'Fecha',    cells: fechaCells },
      { label: 'Hora',
        cells: data.map((d,i) => `<td class="r-hora${i===nowIdx?' now-col':''}">${d.hora}h</td>`).join('') },
      { label: 'Lluvia',
        cells: data.map(d => `<td class="r-rain">${d.lluvia}</td>`).join('') },
      { label: 'Temp',
        cells: data.map(d => `<td class="r-temp">${d.temp}°</td>`).join('') },
      { label: 'Viento',
        cells: data.map(d => `<td class="r-wind wind-${d.intensidad}"><span class="${windClass(d.viento)}">${d.viento}</span></td>`).join('') },
      { label: 'Rachas',
        cells: data.map(d => `<td class="r-gust"><span class="${windClass(d.rafagas)}">${d.rafagas}</span></td>`).join('') },
      { label: 'Na %',
        cells: data.map(d => `<td class="r-high">${d.nub_alta}</td>`).join('') },
      { label: 'Nm %',
        cells: data.map(d => `<td class="r-mid">${d.nub_media}</td>`).join('') },
      { label: 'Nb %',
        cells: data.map(d => `<td class="r-low">${d.nub_baja}</td>`).join('') },
    ];

    // Generar filas normales
    let html = '';
    for (const fila of filas) {
      // Agregar separador antes de la primera columna de datos después de cambio de día
      const cells_array = fila.cells.split('</td>');
      let separated_cells = '';
      for (let i = 0; i < cells_array.length - 1; i++) {
        const cell = cells_array[i] + '</td>';
        // Si es la columna del cambio de día, agregar clase
        if (dayChangeIdx > 0 && i === dayChangeIdx) {
          separated_cells += cell.replace('<td', '<td class="day-separator"');
        } else {
          separated_cells += cell;
        }
      }
      html += `<tr><td class="label">${fila.label}</td>${separated_cells}</tr>`;
    }
    return html;
  }

  function mostrarError(msg) {
    document.getElementById('estado').innerHTML = `
      <div class="error-box">⚠️ ${msg}<br>
        <span class="retry-btn" onclick="cargar()">↻ Reintentar</span>
      </div>`;
  }

  async function cargar() {
    document.getElementById('contenedor').style.display = 'none';
    document.getElementById('estado').style.display = 'block';
    document.getElementById('estado').innerHTML =
      '<span class="spinner"></span> Cargando datos…';

    try {
      const res  = await fetch('/api/wind');
      const data = await res.json();

      if (!res.ok || data.error) { mostrarError(data.error || `Error ${res.status}`); return; }
      if (!Array.isArray(data) || data.length === 0) { mostrarError('Sin datos.'); return; }

      document.getElementById('tabla').innerHTML = buildTable(data);
      document.getElementById('estado').style.display   = 'none';
      document.getElementById('contenedor').style.display = 'block';
      document.getElementById('update-time').textContent =
        'Act. ' + new Date().toLocaleTimeString('es-ES', { hour: '2-digit', minute: '2-digit' });

      setTimeout(() => {
        const nowCol = document.querySelector('.now-col');
        if (nowCol) nowCol.scrollIntoView({ inline: 'center', behavior: 'smooth' });
      }, 300);

    } catch (e) {
      mostrarError('Sin conexión.');
    }
  }

  cargar();
  setInterval(cargar, 10 * 60 * 1000);
</script>
</body>
</html>
